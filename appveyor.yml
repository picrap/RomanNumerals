# RomanNumerals appveyor.yml script

branches:
  only:
    - master

version: '{branch}-{build}'
image: Visual Studio 2022

before_build:
  nuget restore

nuget:
  account_feed: true
  project_feed: true
  disable_publish_on_pr: true

configuration: Release

build:
  parallel: true
  publish_nuget: true
  publish_nuget_symbols: false
  verbosity: minimal

deploy:
  provider: NuGet
  api_key:
    secure: 1FFrOQ1to7x108dE3YPb8ACDEx7kJOJUXBw1M3RE5b8JeMa/G5qYffI1ZJg3td7o
  skip_symbols: false
